<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adm. Provisional – Victoria Pineda</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#071C12;color:#E2F5E8;min-height:100vh;padding-bottom:60px}
  /* ── Header ── */
  .hdr{background:#0D2B1A;border-bottom:1px solid #163D25;padding:18px 20px 16px}
  .hdr-inner{max-width:520px;margin:0 auto}
  .hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px}
  .brand{display:flex;align-items:center;gap:12px}
  .logo-box{width:52px;height:52px;background:#163D25;border-radius:10px;border:1px solid #22C55E40;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
  .logo-box img{width:46px;height:46px;object-fit:contain;mix-blend-mode:lighten}
  .brand-text .sub{font-size:10px;font-weight:700;letter-spacing:3px;color:#4ADE80;text-transform:uppercase;margin-bottom:2px}
  .brand-text .title{font-size:19px;font-weight:800;color:#F0FDF4}
  .btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .btn{border:none;border-radius:10px;padding:8px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
  .btn-ghost{background:#163D25;border:1px solid #22C55E30;color:#86EFAC}
  .btn-edit{background:#163D25;border:1px solid #22C55E30;color:#86EFAC}
  .btn-edit.active{background:#22C55E;border-color:#22C55E;color:#052E16}
  .btn-export{background:linear-gradient(135deg,#16A34A,#22C55E);color:#052E16}
  /* ── Progress ── */
  .progress-card{background:#163D25;border-radius:13px;padding:13px 15px;margin-bottom:10px;border:1px solid #1E4D2B}
  .progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
  .progress-label{font-size:12px;color:#86EFAC;font-weight:600}
  .progress-pct{font-size:21px;font-weight:900;color:#F0FDF4}
  .progress-pct.done{color:#22C55E}
  .bar-bg{height:8px;background:#071C12;border-radius:99px;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,#16A34A,#22C55E,#4ADE80);border-radius:99px;transition:width .5s ease}
  /* ── Date card ── */
  .date-card{background:#163D25;border-radius:13px;padding:11px 15px;border:1px solid #1E4D2B;display:flex;justify-content:space-between;align-items:center}
  .date-card.warn{border-color:#EF444460}
  .date-label{font-size:10px;color:#4ADE80;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
  .date-input{background:transparent;border:none;color:#F0FDF4;font-size:14px;font-weight:700;outline:none;font-family:inherit;cursor:pointer;width:160px}
  .days-num{font-size:25px;font-weight:900;line-height:1}
  .days-label{font-size:11px;color:#4ADE80;font-weight:600;text-align:right}
  /* ── Timeline ── */
  .timeline{max-width:520px;margin:0 auto;padding:22px 18px 0}
  .edit-hint{background:#0D2B1A;border:1px dashed #22C55E40;border-radius:13px;padding:11px 14px;margin-bottom:15px;font-size:13px;color:#86EFAC;line-height:1.6}
  .edit-hint b{color:#4ADE80}
  /* ── Stage row ── */
  .stage-row{display:flex;gap:0}
  .stage-line{display:flex;flex-direction:column;align-items:center;width:38px;flex-shrink:0}
  .dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .3s;user-select:none;position:relative}
  .connector{width:2px;flex-grow:1;min-height:14px;border-radius:2px;margin:2px 0;transition:background .3s}
  /* ── Stage card ── */
  .stage-body{flex:1;margin-left:12px;margin-bottom:12px}
  .stage-header{border-radius:13px;padding:12px 13px;cursor:pointer;transition:all .2s}
  .stage-header.open{border-radius:13px 13px 0 0}
  .stage-header-inner{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .stage-etapa{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
  .stage-title{font-size:15px;font-weight:700;color:#F0FDF4;display:flex;align-items:center;gap:6px}
  .stage-title input{background:#071C12;border:1px solid #2D6A3F;border-radius:8px;color:#F0FDF4;font-size:14px;font-weight:700;padding:3px 8px;width:100%;outline:none;font-family:inherit}
  .stage-pct{font-size:18px;font-weight:900;text-align:right}
  .stage-count{font-size:10px;color:#4ADE80;text-align:right}
  .stage-bar{height:4px;background:#071C12;border-radius:99px;overflow:hidden;margin-top:9px}
  .stage-bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
  /* ── Edit controls ── */
  .edit-controls{display:flex;align-items:center;gap:5px}
  .move-wrap{display:flex;flex-direction:column;gap:2px}
  .move-btn{background:#163D25;border:1px solid #1E4D2B;border-radius:6px;color:#86EFAC;font-size:12px;padding:2px 6px;cursor:pointer;font-family:inherit;line-height:1}
  .move-btn:disabled{color:#1E4D2B;cursor:default}
  .color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid #071C12;flex-shrink:0;position:relative}
  .del-btn{background:#EF444420;border:1px solid #EF444440;border-radius:8px;padding:5px 8px;color:#EF4444;font-size:13px;cursor:pointer;font-family:inherit}
  /* ── Picker popup ── */
  .picker-popup{position:absolute;top:28px;right:0;background:#0D2B1A;border:1px solid #1E4D2B;border-radius:12px;padding:8px;z-index:100;box-shadow:0 8px 24px #00000080}
  .color-picker-grid{display:flex;flex-wrap:wrap;gap:6px;width:116px}
  .color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border .15s}
  .color-swatch.sel{border-color:#fff}
  .icon-picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;width:148px}
  .icon-btn{background:transparent;border:none;border-radius:8px;padding:6px;font-size:18px;cursor:pointer}
  .icon-btn.sel{background:#163D25}
  /* ── Items ── */
  .items-list{background:#04120A;border:1px solid #163D25;border-top:none;border-radius:0 0 13px 13px;overflow:hidden}
  .item-row{display:flex;align-items:center;gap:8px;padding:10px 13px;border-top:1px solid #163D25;transition:background .2s;cursor:pointer}
  .item-row:first-child{border-top:none}
  .item-row.done-row{background:#22C55E08}
  .item-row.edit-mode{cursor:default}
  .checkbox{width:20px;height:20px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#052E16;transition:all .2s;border:2px solid #1E4D2B}
  .checkbox.checked{color:#052E16}
  .item-text{flex:1;min-width:0;font-size:13px;line-height:1.4;color:#BBF7D0}
  .item-text.done-text{color:#4ADE80;text-decoration:line-through}
  .item-text input{background:#071C12;border:1px solid #2D6A3F;border-radius:7px;color:#F0FDF4;font-size:13px;padding:3px 8px;width:100%;outline:none;font-family:inherit}
  .item-controls{display:flex;align-items:center;gap:4px;flex-shrink:0}
  .item-del{background:none;border:none;color:#EF4444;cursor:pointer;font-size:15px;padding:0 2px;font-family:inherit}
  /* ── Add item ── */
  .add-item-row{display:flex;gap:8px;padding:9px 13px;border-top:1px solid #163D25}
  .add-item-input{flex:1;background:#071C12;border:1px solid #1E4D2B;border-radius:8px;color:#F0FDF4;font-size:13px;padding:7px 10px;outline:none;font-family:inherit}
  .add-item-input::placeholder{color:#2D6A3F}
  .add-item-btn{border:none;border-radius:8px;color:#052E16;font-weight:800;font-size:18px;padding:0 14px;cursor:pointer;font-family:inherit}
  /* ── Add stage ── */
  .add-stage-btn{width:100%;background:#0D2B1A;border:1px dashed #2D6A3F;border-radius:13px;padding:14px;color:#4ADE80;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;font-family:inherit}
  /* ── Done banner ── */
  .done-banner{text-align:center;padding:22px 0;font-size:14px;color:#22C55E;font-weight:700}
  .hint-bottom{text-align:center;margin-top:10px;font-size:12px;color:#163D25}
  /* ── Confirm modal ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-box{background:#0D2B1A;border:1px solid #1E4D2B;border-radius:16px;padding:22px;max-width:300px;width:100%}
  .modal-msg{font-size:15px;color:#F0FDF4;margin-bottom:18px;line-height:1.5}
  .modal-btns{display:flex;gap:10px}
  .modal-cancel{flex:1;background:#163D25;border:none;border-radius:10px;padding:11px;color:#86EFAC;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .modal-ok{flex:1;background:#EF4444;border:none;border-radius:10px;padding:11px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  /* ── Image modal ── */
  .img-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:16px;overflow-y:auto}
  .img-modal-box{background:#0D2B1A;border-radius:14px;padding:14px;max-width:680px;width:100%}
  .img-hint{font-size:13px;color:#86EFAC;margin-bottom:10px;text-align:center;line-height:1.5}
  .img-modal-box img{width:100%;border-radius:8px;display:block}
  .img-close{margin-top:11px;width:100%;background:#163D25;border:none;border-radius:10px;padding:12px;color:#F0FDF4;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  /* ── Responsive ── */
  @media(max-width:380px){.brand-text .title{font-size:16px}.btns{gap:4px}.btn{padding:7px 10px;font-size:11px}}
</style>
</head>
<body>

<!-- Confirm modal -->
<div id="confirmModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div id="confirmMsg" class="modal-msg"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="modal-ok" onclick="doConfirm()">Eliminar</button>
    </div>
  </div>
</div>

<!-- Image modal -->
<div id="imgModal" class="img-modal-overlay" style="display:none" onclick="document.getElementById('imgModal').style.display='none'">
  <div class="img-modal-box" onclick="event.stopPropagation()">
    <div class="img-hint">📱 <b>Mantén presionada</b> la imagen para guardarla · En PC: clic derecho → Guardar</div>
    <img id="imgPreview" src="" alt="Reporte">
    <button class="img-close" onclick="document.getElementById('imgModal').style.display='none'">Cerrar</button>
  </div>
</div>

<!-- Header -->
<div class="hdr">

    <div class="progress-card">

<!-- Timeline -->

<script>
const COLORS=['#22C55E','#3B82F6','#F59E0B','#8B5CF6','#06B6D4','#EF4444','#F97316','#EC4899'];
const ICONS=['🔑','📋','⚙️','🤝','🏁','📁','📌','✅','🏗️','💼','📊','🔔'];
const KEY='vp_provisional_v1';
const uid=()=>Math.random().toString(36).slice(2,9);

const DEF=[
  {id:'s1',title:'Apertura',icon:'🔑',color:'#22C55E',items:[
    {id:'a1',text:'Recepción y revisión de documentos del conjunto',done:false},
    {id:'a2',text:'Verificación de requisitos legales y reglamento',done:false},
    {id:'a3',text:'Firma de contrato de administración provisional',done:false},
    {id:'a4',text:'Inventario físico del conjunto',done:false},
    {id:'a5',text:'Apertura de cuentas bancarias',done:false}
  ]},
  {id:'s2',title:'Capacitaciones',icon:'📋',color:'#3B82F6',items:[
    {id:'b1',text:'Capacitación a delegados y personal',done:false},
    {id:'b2',text:'Inducción a residentes sobre reglamento',done:false},
    {id:'b3',text:'Capacitación en manejo del sistema de cobros',done:false},
    {id:'b4',text:'Socialización del manual de convivencia',done:false}
  ]},
  {id:'s3',title:'Operación',icon:'⚙️',color:'#8B5CF6',items:[
    {id:'c1',text:'Gestión de cartera y cobros mensuales',done:false},
    {id:'c2',text:'Mantenimientos preventivos recurrentes',done:false},
    {id:'c3',text:'Control de proveedores y contratos',done:false},
    {id:'c4',text:'Informes financieros mensuales',done:false},
    {id:'c5',text:'Atención de PQR de residentes',done:false}
  ]},
  {id:'s4',title:'Reunión Previa',icon:'🤝',color:'#F59E0B',items:[
    {id:'d1',text:'Convocatoria formal a propietarios',done:false},
    {id:'d2',text:'Preparación de informes de gestión',done:false},
    {id:'d3',text:'Auditoría de cuentas y presupuesto',done:false},
    {id:'d4',text:'Revisión de documentos para entregar',done:false}
  ]},
  {id:'s5',title:'Asamblea & Entrega',icon:'🏁',color:'#06B6D4',items:[
    {id:'e1',text:'Realización de asamblea general',done:false},
    {id:'e2',text:'Elección del consejo de administración',done:false},
    {id:'e3',text:'Entrega formal de documentos y cuentas',done:false},
    {id:'e4',text:'Acta de entrega firmada',done:false},
    {id:'e5',text:'Cierre de administración provisional',done:false}
  ]}
];

let stages=[], editMode=false, expanded={}, picker=null, confirmCb=null;

function load(){
  try{
    const s=localStorage.getItem(KEY);
    if(s){const d=JSON.parse(s);stages=d.stages||JSON.parse(JSON.stringify(DEF));document.getElementById('dateInput').value=d.date||'';}
    else stages=JSON.parse(JSON.stringify(DEF));
  }catch{stages=JSON.parse(JSON.stringify(DEF));}
  updateDate();render();
}

function saveState(){
  try{localStorage.setItem(KEY,JSON.stringify({stages,date:document.getElementById('dateInput').value}));}catch{}
  updateDate();
}

function pct(items){if(!items.length)return 0;return Math.round(items.filter(i=>i.done).length/items.length*100);}
function totalPct(){return pct(stages.flatMap(s=>s.items));}
function activeIdx(){for(let i=0;i<stages.length;i++)if(pct(stages[i].items)<100)return i;return stages.length-1;}

function updateDate(){
  const v=document.getElementById('dateInput').value;
  const dc=document.getElementById('dateCard');
  const dr=document.getElementById('daysRight');
  if(!v){dr.style.display='none';dc.classList.remove('warn');return;}
  const today=new Date();today.setHours(0,0,0,0);
  const days=Math.ceil((new Date(v+'T00:00:00')-today)/86400000);
  document.getElementById('daysNum').textContent=Math.max(0,days);
  document.getElementById('daysNum').style.color=days<14?'#EF4444':days<30?'#F59E0B':'#22C55E';
  dr.style.display='block';
  dc.classList.toggle('warn',days<14);
}

function toggleEdit(){
  editMode=!editMode;
  const btn=document.getElementById('editBtn');
  btn.textContent=editMode?'✓ Listo':'✏️ Editar';
  btn.classList.toggle('active',editMode);
  if(editMode) Object.keys(expanded).forEach(k=>expanded[k]=true);
  closePicker();render();
}

function resetProgress(){
  askConfirm('¿Reiniciar todo el progreso?',()=>{stages.forEach(s=>s.items.forEach(i=>i.done=false));saveState();render();});
}

function toggleItem(sid,iid){
  if(editMode)return;
  const s=stages.find(x=>x.id===sid);
  if(s){const i=s.items.find(x=>x.id===iid);if(i){i.done=!i.done;saveState();render();}}
}

function toggleExpand(sid){
  if(editMode)return;
  expanded[sid]=!expanded[sid];render();
}

function moveStage(idx,dir){
  const to=idx+dir;if(to<0||to>=stages.length)return;
  const a=[...stages];const[el]=a.splice(idx,1);a.splice(to,0,el);stages=a;saveState();render();
}

function moveItem(sid,iidx,dir){
  const s=stages.find(x=>x.id===sid);if(!s)return;
  const to=iidx+dir;if(to<0||to>=s.items.length)return;
  const a=[...s.items];const[el]=a.splice(iidx,1);a.splice(to,0,el);s.items=a;saveState();render();
}

function deleteStage(sid,title){
  askConfirm(`¿Eliminar la etapa "${title}"?`,()=>{stages=stages.filter(s=>s.id!==sid);saveState();render();});
}

function deleteItem(sid,iid,text){
  askConfirm(`¿Eliminar "${text.substring(0,30)}..."?`,()=>{
    const s=stages.find(x=>x.id===sid);if(s)s.items=s.items.filter(i=>i.id!==iid);saveState();render();
  });
}

function addStage(){
  const ns={id:uid(),title:'Nueva etapa',icon:'📌',color:'#22C55E',items:[]};
  stages.push(ns);expanded[ns.id]=true;saveState();render();
}

function addItem(sid){
  const inp=document.getElementById('newitem_'+sid);
  if(!inp||!inp.value.trim())return;
  const s=stages.find(x=>x.id===sid);
  if(s){s.items.push({id:uid(),text:inp.value.trim(),done:false});inp.value='';saveState();render();}
}

// ── Picker ──────────────────────────────────────────────────────────────────
function closePicker(){picker=null;}

function openColorPicker(sid,el){
  if(picker&&picker.sid===sid&&picker.type==='color'){closePicker();render();return;}
  picker={type:'color',sid};render();
  setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),50);
}
function openIconPicker(sid,el){
  if(picker&&picker.sid===sid&&picker.type==='icon'){closePicker();render();return;}
  picker={type:'icon',sid};render();
  setTimeout(()=>document.addEventListener('click',closePicker,{once:true}),50);
}
function setColor(sid,c){const s=stages.find(x=>x.id===sid);if(s){s.color=c;}closePicker();saveState();render();}
function setIcon(sid,ic){const s=stages.find(x=>x.id===sid);if(s){s.icon=ic;}closePicker();saveState();render();}

// ── Confirm ──────────────────────────────────────────────────────────────────
function askConfirm(msg,cb){
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmModal').style.display='flex';
  confirmCb=cb;
}
function closeConfirm(){document.getElementById('confirmModal').style.display='none';confirmCb=null;}
function doConfirm(){if(confirmCb)confirmCb();closeConfirm();}

// ── Inline edit helpers ───────────────────────────────────────────────────────
function startEditStageTitle(sid){
  const el=document.getElementById('stitle_'+sid);
  if(!el)return;
  const inp=document.createElement('input');
  const s=stages.find(x=>x.id===sid);
  inp.value=s?s.title:'';
  inp.style.cssText='background:#071C12;border:1px solid #2D6A3F;border-radius:8px;color:#F0FDF4;font-size:14px;font-weight:700;padding:3px 8px;width:150px;outline:none;font-family:inherit';
  el.replaceWith(inp);inp.focus();
  const done=()=>{if(s&&inp.value.trim())s.title=inp.value.trim();saveState();render();};
  inp.onblur=done;inp.onkeydown=e=>{if(e.key==='Enter')done();};
}

function startEditItem(sid,iid){
  const el=document.getElementById('itext_'+sid+'_'+iid);
  if(!el)return;
  const s=stages.find(x=>x.id===sid);
  const item=s?s.items.find(i=>i.id===iid):null;
  if(!item)return;
  const inp=document.createElement('input');
  inp.value=item.text;
  inp.style.cssText='background:#071C12;border:1px solid #2D6A3F;border-radius:7px;color:#F0FDF4;font-size:13px;padding:3px 8px;width:100%;outline:none;font-family:inherit';
  el.replaceWith(inp);inp.focus();
  const done=()=>{if(inp.value.trim())item.text=inp.value.trim();saveState();render();};
  inp.onblur=done;inp.onkeydown=e=>{if(e.key==='Enter')done();};
}

// ── Render ──────────────────────────────────────────────────────────────────
function render(){
  const tot=totalPct();
  document.getElementById('totalPct').textContent=tot+'%';
  document.getElementById('totalPct').className='progress-pct'+(tot===100?' done':'');
  document.getElementById('totalBar').style.width=tot+'%';

  const tl=document.getElementById('timeline');
  const actIdx=activeIdx();
  let html='';

  if(editMode) html+=`<div class="edit-hint"><b>Modo edición</b> · Toca nombre para editar · 🎨 color/ícono · ↑↓ reordena · 🗑️ elimina · ＋ agrega</div>`;

  stages.forEach((stage,idx)=>{
    const prog=pct(stage.items);
    const isDone=prog===100;
    const isAct=idx===actIdx;
    const isOpen=editMode||!!expanded[stage.id];
    const c=stage.color;
    const dot_bg=isDone?c:isAct?c+'25':'#0D2B1A';
    const dot_border=isDone||isAct?c:'#1E4D2B';
    const dot_shadow=isAct?`box-shadow:0 0 16px ${c}50`:'' ;
    const connector_bg=isDone?c+'60':'#163D25';

    // dot icon
    const dotIcon=isDone&&!editMode?'✓':stage.icon;

    // header controls
    let rightControls='';
    if(editMode){
      // move btns
      const upDis=idx===0?'disabled':'';
      const dnDis=idx===stages.length-1?'disabled':'';
      // color picker popup
      let cpopup='';
      if(picker&&picker.sid===stage.id&&picker.type==='color'){
        cpopup=`<div class="picker-popup color-picker-grid" onclick="event.stopPropagation()">
          ${COLORS.map(cc=>`<div class="color-swatch${cc===c?' sel':''}" style="background:${cc}" onclick="setColor('${stage.id}','${cc}')"></div>`).join('')}
        </div>`;
      }
      let ipopup='';
      if(picker&&picker.sid===stage.id&&picker.type==='icon'){
        ipopup=`<div class="picker-popup icon-picker-grid" onclick="event.stopPropagation()">
          ${ICONS.map(ic=>`<button class="icon-btn${ic===stage.icon?' sel':''}" onclick="setIcon('${stage.id}','${ic}')">${ic}</button>`).join('')}
        </div>`;
      }
      rightControls=`
        <div class="edit-controls">
          <div class="move-wrap">
            <button class="move-btn" onclick="event.stopPropagation();moveStage(${idx},-1)" ${upDis}>↑</button>
            <button class="move-btn" onclick="event.stopPropagation();moveStage(${idx},1)" ${dnDis}>↓</button>
          </div>
          <div style="position:relative">
            <div class="color-dot" style="background:${c}" onclick="event.stopPropagation();openColorPicker('${stage.id}',this)"></div>
            ${cpopup}
          </div>
          <div style="position:relative">
            <button class="icon-btn" onclick="event.stopPropagation();openIconPicker('${stage.id}',this)">${stage.icon}</button>
            ${ipopup}
          </div>
          <button class="del-btn" onclick="event.stopPropagation();deleteStage('${stage.id}','${stage.title.replace(/'/g,"\\'")}')">🗑️</button>
        </div>`;
    } else {
      rightControls=`
        <div style="text-align:right">
          <div class="stage-pct" style="color:${isDone?'#22C55E':c}">${prog}%</div>
          <div class="stage-count">${stage.items.filter(i=>i.done).length}/${stage.items.length}</div>
        </div>`;
    }

    // items
    let itemsHtml='';
    if(isOpen){
      stage.items.forEach((item,iIdx)=>{
        const ckStyle=`background:${item.done?c:'transparent'};border-color:${item.done?c:'#1E4D2B'}`;
        const editIc=editMode?`<span onclick="event.stopPropagation();startEditItem('${stage.id}','${item.id}')" style="color:#2D6A3F;margin-left:4px;font-size:11px;cursor:pointer">✏️</span>`:'';
        const upDis=iIdx===0?'disabled':'';
        const dnDis=iIdx===stage.items.length-1?'disabled':'';
        const itemControls=editMode?`
          <div class="item-controls">
            <div class="move-wrap">
              <button class="move-btn" onclick="event.stopPropagation();moveItem('${stage.id}',${iIdx},-1)" ${upDis}>↑</button>
              <button class="move-btn" onclick="event.stopPropagation();moveItem('${stage.id}',${iIdx},1)" ${dnDis}>↓</button>
            </div>
            <button class="item-del" onclick="event.stopPropagation();deleteItem('${stage.id}','${item.id}','${item.text.substring(0,30).replace(/'/g,"\\'")}')">✕</button>
          </div>`:'';
        const rowClass=`item-row${item.done&&!editMode?' done-row':''}${editMode?' edit-mode':''}`;
        const clickAttr=editMode?'':`onclick="toggleItem('${stage.id}','${item.id}')"`;
        itemsHtml+=`
          <div class="${rowClass}" ${clickAttr}>
            ${!editMode?`<div class="checkbox${item.done?' checked':''}" style="${ckStyle}">${item.done?'✓':''}</div>`:''}
            <div class="item-text${item.done&&!editMode?' done-text':''}" id="itext_${stage.id}_${item.id}">${item.text}${editIc}</div>
            ${itemControls}
          </div>`;
      });

      if(editMode){
        itemsHtml+=`
          <div class="add-item-row">
            <input class="add-item-input" id="newitem_${stage.id}" placeholder="Nuevo ítem..." onkeydown="if(event.key==='Enter')addItem('${stage.id}')">
            <button class="add-item-btn" style="background:${c}" onclick="addItem('${stage.id}')">＋</button>
          </div>`;
      }
    }

    html+=`
      <div class="stage-row">
        <div class="stage-line">
          <div class="dot" style="background:${dot_bg};border:2px solid ${dot_border};${dot_shadow}" onclick="event.stopPropagation();${editMode?`openIconPicker('${stage.id}',this)`:`toggleExpand('${stage.id}')`}">${dotIcon}</div>
          ${idx<stages.length-1?`<div class="connector" style="background:${connector_bg}"></div>`:''}
        </div>
        <div class="stage-body">
          <div class="stage-header${isOpen?' open':''}" style="background:#0D2B1A;border:1px solid ${isAct?c+'50':'#1E4D2B'};box-shadow:${isAct?`0 4px 20px ${c}20`:''}" onclick="toggleExpand('${stage.id}')">
            <div class="stage-header-inner">
              <div style="flex:1;min-width:0">
                <div class="stage-etapa" style="color:${c}">Etapa ${idx+1}</div>
                <div class="stage-title">
                  <span id="stitle_${stage.id}" onclick="${editMode?`event.stopPropagation();startEditStageTitle('${stage.id}')`:''}" style="cursor:${editMode?'pointer':'default'}">${stage.title}</span>
                  ${editMode?`<span onclick="event.stopPropagation();startEditStageTitle('${stage.id}')" style="font-size:12px;color:#2D6A3F;cursor:pointer">✏️</span>`:''}
                </div>
              </div>
              ${rightControls}
            </div>
            ${!editMode?`<div class="stage-bar"><div class="stage-bar-fill" style="width:${prog}%;background:${c}"></div></div>`:''}
          </div>
          ${isOpen?`<div class="items-list">${itemsHtml}</div>`:''}
        </div>
      </div>`;
  });

  if(editMode) html+=`<button class="add-stage-btn" onclick="addStage()">＋ Agregar nueva etapa</button>`;
  if(tot===100&&!editMode) html+=`<div class="done-banner">🎉 ¡Proceso completado! Todo listo para la asamblea.</div>`;
  html+=`<div class="hint-bottom">${editMode?'Modo edición — toca ✓ Listo cuando termines':'Toca cada etapa para ver el checklist'}</div>`;

  tl.innerHTML=html;
}

// ── Canvas export (horizontal 1280×720) ──────────────────────────────────────
function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function rr(ctx,x,y,w,h,rad){if(w<=0||h<=0)return;ctx.beginPath();ctx.moveTo(x+rad,y);ctx.lineTo(x+w-rad,y);ctx.quadraticCurveTo(x+w,y,x+w,y+rad);ctx.lineTo(x+w,y+h-rad);ctx.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);ctx.lineTo(x+rad,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+rad);ctx.quadraticCurveTo(x,y,x+rad,y);ctx.closePath();}
function rrc(ctx,x,y,w,h,rad){if(w<=0||h<=0)return;ctx.beginPath();ctx.moveTo(x+rad,y);ctx.lineTo(x+w-rad,y);ctx.quadraticCurveTo(x+w,y,x+w,y+rad);ctx.lineTo(x+w,y+h-rad);ctx.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);ctx.lineTo(x+rad,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-rad);ctx.lineTo(x,y+rad);ctx.quadraticCurveTo(x,y,x+rad,y);ctx.closePath();}
function wrapText(ctx,text,maxW){const words=text.split(' ');const lines=[];let line='';for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;}if(line)lines.push(line);return lines;}

function exportImage(){
  const W=1280,H=720;
  const tot=totalPct();
  const dateVal=document.getElementById('dateInput').value;
  const n=stages.length;
  const now=new Date().toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'});

  const c=document.createElement('canvas');c.width=W;c.height=H;
  const ctx=c.getContext('2d');

  // bg
  const bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,'#071C12');bg.addColorStop(1,'#0D2B1A');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // dots pattern
  ctx.fillStyle='rgba(34,197,94,0.04)';
  for(let gx=40;gx<W;gx+=50)for(let gy=40;gy<H;gy+=50){ctx.beginPath();ctx.arc(gx,gy,1,0,Math.PI*2);ctx.fill();}

  // header bar
  rrc(ctx,0,0,W,90,0);ctx.fillStyle='rgba(13,43,26,0.95)';ctx.fill();
  ctx.strokeStyle='#163D25';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,90);ctx.lineTo(W,90);ctx.stroke();

  // logo area (green box)
  rrc(ctx,32,18,56,56,10);ctx.fillStyle='#163D25';ctx.fill();ctx.strokeStyle='rgba(34,197,94,0.25)';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#4ADE80';ctx.font='bold 24px sans-serif';ctx.textAlign='center';ctx.fillText('VP',60,52);ctx.textAlign='left';

  // title
  ctx.fillStyle='#4ADE80';ctx.font='bold 11px sans-serif';ctx.fillText('PROPIEDAD HORIZONTAL · INFORME DE ESTADO',100,34);
  ctx.fillStyle='#F0FDF4';ctx.font='bold 26px sans-serif';ctx.fillText('Administración Provisional',100,66);

  // date & days right
  ctx.fillStyle='#2D6A3F';ctx.font='12px sans-serif';ctx.textAlign='right';ctx.fillText('Generado el '+now,W-36,30);
  if(dateVal){
    const today=new Date();today.setHours(0,0,0,0);
    const days=Math.max(0,Math.ceil((new Date(dateVal+'T00:00:00')-today)/86400000));
    const dc=days<14?'#EF4444':days<30?'#F59E0B':'#22C55E';
    ctx.fillStyle='#2D6A3F';ctx.font='bold 10px sans-serif';ctx.fillText('ASAMBLEA EN',W-36,50);
    ctx.fillStyle=dc;ctx.font='bold 24px sans-serif';ctx.fillText(days+' días',W-36,76);
  }
  ctx.textAlign='left';

  // total progress
  const pbX=460,pbY=52,pbW=360,pbH=10;
  ctx.fillStyle='#2D6A3F';ctx.font='bold 10px sans-serif';ctx.fillText('PROGRESO TOTAL',pbX,46);
  ctx.fillStyle=tot===100?'#22C55E':'#F0FDF4';ctx.font='bold 18px sans-serif';ctx.fillText(tot+'%',pbX+pbW+12,68);
  rrc(ctx,pbX,pbY,pbW,pbH,5);ctx.fillStyle='#04120A';ctx.fill();
  if(tot>0){
    const g=ctx.createLinearGradient(pbX,0,pbX+pbW,0);
    g.addColorStop(0,'#16A34A');g.addColorStop(.5,'#22C55E');g.addColorStop(1,'#4ADE80');
    rrc(ctx,pbX,pbY,pbW*(tot/100),pbH,5);ctx.fillStyle=g;ctx.fill();
  }

  // timeline
  const PAD=32,timeY=90+48,colW=Math.floor((W-PAD*2)/n);
  const dotY=timeY+16;

  // connector line base
  ctx.strokeStyle='#163D25';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(PAD+colW*.5,dotY);ctx.lineTo(PAD+colW*(n-.5),dotY);ctx.stroke();

  stages.forEach((stage,idx)=>{
    const prog=pct(stage.items);const isDone=prog===100;
    const cx=PAD+colW*idx+colW/2;
    const cardX=PAD+colW*idx+8,cw=colW-16;
    const col=stage.color;

    if(idx<n-1){
      ctx.strokeStyle=isDone?hexAlpha(col,.6):'#163D25';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(cx,dotY);ctx.lineTo(cx+colW,dotY);ctx.stroke();
    }
    // glow
    if(isDone||idx===activeIdx()){
      ctx.beginPath();ctx.arc(cx,dotY,22,0,Math.PI*2);ctx.fillStyle=hexAlpha(col,.15);ctx.fill();
    }
    // dot
    ctx.beginPath();ctx.arc(cx,dotY,16,0,Math.PI*2);ctx.fillStyle=isDone?col:hexAlpha(col,.2);ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.stroke();
    ctx.fillStyle=isDone?'#052E16':col;ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText(isDone?'✓':stage.icon,cx,dotY+5);

    // etapa label
    ctx.fillStyle=col;ctx.font='bold 10px sans-serif';ctx.fillText('ETAPA '+(idx+1),cx,dotY-26);
    ctx.textAlign='left';

    const cardY=dotY+30;const maxH=H-cardY-18;

    rrc(ctx,cardX,cardY,cw,maxH,11);ctx.fillStyle='#0D2B1A';ctx.fill();
    ctx.strokeStyle=hexAlpha(col,.3);ctx.lineWidth=1.5;ctx.stroke();

    // accent top
    rrc(ctx,cardX,cardY,cw,4,2);ctx.fillStyle=col;ctx.fill();

    // title
    ctx.fillStyle='#F0FDF4';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
    const tlines=wrapText(ctx,stage.title,cw-16);
    tlines.forEach((ln,li)=>ctx.fillText(ln,cx,cardY+20+li*16));

    const badgeY=cardY+20+tlines.length*16+6;
    ctx.fillStyle=isDone?'#22C55E':col;ctx.font='bold 20px sans-serif';ctx.fillText(prog+'%',cx,badgeY);
    ctx.fillStyle='#2D6A3F';ctx.font='11px sans-serif';ctx.fillText(stage.items.filter(i=>i.done).length+'/'+stage.items.length,cx,badgeY+15);
    ctx.textAlign='left';

    // mini bar
    const mbX=cardX+10,mbY=badgeY+22,mbW=cw-20;
    rrc(ctx,mbX,mbY,mbW,4,2);ctx.fillStyle='#04120A';ctx.fill();
    if(prog>0){rrc(ctx,mbX,mbY,mbW*(prog/100),4,2);ctx.fillStyle=col;ctx.fill();}

    // items
    let itemY=mbY+14;
    stage.items.forEach(item=>{
      if(itemY+20>cardY+maxH-8)return;
      const cbS=11,cbX=cardX+8,cbY=itemY+cbS/2-cbS/2;
      rrc(ctx,cbX,cbY,cbS,cbS,3);ctx.fillStyle=item.done?col:'transparent';ctx.fill();
      ctx.strokeStyle=item.done?col:'#1E4D2B';ctx.lineWidth=1;ctx.stroke();
      if(item.done){ctx.fillStyle='#052E16';ctx.font='bold 7px sans-serif';ctx.textAlign='center';ctx.fillText('✓',cbX+cbS/2,cbY+cbS*.75);ctx.textAlign='left';}
      ctx.font='11px sans-serif';ctx.fillStyle=item.done?'#2D6A3F':'#86EFAC';
      const mx=cw-cbS-22;const lines=wrapText(ctx,item.text,mx);
      const line=lines[0]+(lines.length>1?'…':'');
      ctx.fillText(line,cbX+cbS+5,itemY+11);
      if(item.done){const tw=ctx.measureText(line).width;ctx.strokeStyle='#2D6A3F';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cbX+cbS+5,itemY+7);ctx.lineTo(cbX+cbS+5+tw,itemY+7);ctx.stroke();}
      itemY+=18;
    });
  });

  // footer
  ctx.fillStyle='#163D25';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('Victoria Pineda Administraciones · Reporte generado automáticamente',W/2,H-8);
  ctx.textAlign='left';

  const url=c.toDataURL('image/png');
  try{
    const a=document.createElement('a');
    a.download='Estado-Provisional-'+new Date().toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-')+'.png';
    a.href=url;a.click();
  }catch{}
  document.getElementById('imgPreview').src=url;
  document.getElementById('imgModal').style.display='flex';
}

load();
